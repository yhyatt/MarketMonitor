name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'skills/market-monitor/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/market-monitor/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: skills/market-monitor

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: skills/market-monitor/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=market_monitor --cov-report=term-missing --cov-fail-under=60

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check syntax
        run: |
          python -m py_compile market_monitor/__main__.py
          python -m py_compile market_monitor/config.py
          python -m py_compile market_monitor/collectors/arxiv.py
          python -m py_compile market_monitor/filters/keyword.py
